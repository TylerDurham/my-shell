# ============================================================
# PLUGINS
# ============================================================
# set -g @plugin 'tmux-plugins/tpm'
# set -g @plugin 'tmux-plugins/tmux-sensible'
# set -g @plugin 'tmux-plugins/tmux-yank'

# ============================================================
# GENERAL
# ============================================================
# Start windows and panes at 1 to match keyboard layout
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

set -g history-limit 50000
set -g mouse on

# ============================================================
# TERMINAL
# ============================================================
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:RGB"

# ============================================================
# CLIPBOARD
# ============================================================
# Ensure wl-copy can find the Wayland display socket
set -g update-environment "WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_RUNTIME_DIR"

# OSC 52 passthrough ‚ÄĒ works with Ghostty on Linux and macOS
set -g set-clipboard on
set -g @yank_action 'copy-pipe-and-cancel'

# ============================================================
# PREFIX
# ============================================================
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ============================================================
# KEY BINDINGS
# ============================================================
bind r source-file ~/.config/tmux/tmux.conf  # reload config
bind c new-window -c "#{window_current_path}"
bind u run-shell '~/.config/tmux/popup.sh'

bind | split-window -h
bind - split-window -v

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Repeatable arrow-key pane resizing
bind -r Left  resize-pane -L 5
bind -r Down  resize-pane -D 5
bind -r Up    resize-pane -U 5
bind -r Right resize-pane -R 5

# ============================================================
# COPY MODE
# ============================================================
set -g mode-keys vi
bind -T copy-mode-vi v   send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y   send-keys -X copy-selection-and-cancel
unbind -T copy-mode-vi MouseDragEnd1Pane

# ============================================================
# CURSOR
# ============================================================
set -g cursor-style blinking-block
set-hook -g pane-mode-changed 'if -F "#{==:#{pane_mode},copy-mode}" "set cursor-style blinking-underline" "set cursor-style blinking-block"'

# ============================================================
# STYLE
# ============================================================
set -g popup-border-style fg=#FFCC00

# ============================================================
# THEME

# Pull colors from terminal theme
thm_bg="black"
thm_fg="colour244"
thm_cyan="cyan"
thm_black="black"
thm_gray="black"
thm_magenta="magenta"
thm_pink="pink"
thm_red="red"
thm_green="green"
thm_yellow="yellow"
thm_blue="blue"
thm_orange="orange"
thm_black4="black"

# Status bar settings
set -g status "on"
set -g status-bg "${thm_bg}"
set -g status-justify "left"
set -g status-left-length "100"
set -g status-right-length "100"

# Messages
set -g message-style "fg=${thm_cyan},bg=${thm_gray},align=centre"
set -g message-command-style "fg=${thm_cyan},bg=${thm_gray},align=centre"

# Panes
set -g pane-border-style "fg=${thm_gray}"
set -g pane-active-border-style "fg=${thm_blue}"

# Windows
set -g window-status-activity-style "fg=${thm_fg},bg=${thm_bg},none"
set -g window-status-separator ""
set -g window-status-style "fg=${thm_fg},bg=${thm_bg},none"

# Statusline - current window
set -g window-status-current-format "#[fg=${thm_blue},bg=${thm_bg}] #I: #[fg=${thm_green},bg=${thm_bg}](‚úď) #[fg=${thm_fg},bg=${thm_bg}]#(echo '#{pane_current_path}' | rev | cut -d'/' -f-2 | rev) #[fg=${thm_magenta},bg=${thm_bg}]"

# Statusline - other windows
set -g window-status-format "#[fg=${thm_blue},bg=${thm_bg}] #I: #[fg=${thm_fg},bg=${thm_bg}]#W"

# Statusline - right side
set -g status-right "#[fg=${thm_blue},bg=${thm_bg},nobold,nounderscore,noitalics]#[fg=${thm_bg},bg=${thm_blue},nobold,nounderscore,noitalics] #[fg=${thm_fg},bg=${thm_gray}] #W #{?client_prefix,#[fg=${thm_magenta}],#[fg=${thm_green}]}#[bg=${thm_gray}]#{?client_prefix,#[bg=${thm_magenta}],#[bg=${thm_green}]}#[fg=${thm_bg}] #[fg=${thm_fg},bg=${thm_gray}] #S "

# Statusline - left side (OS ICON)
set -g status-left "#[fg=${thm_cyan}]#(~/.local/share/my/bin/sys-get-os-icon) "

# Modes
set -g clock-mode-colour "${thm_blue}"
set -g mode-style "fg=${thm_blue} bg=${thm_black4} bold"
