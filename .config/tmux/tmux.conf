#    ‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĒ‚Ėą‚Ėą‚Ėą‚Ėą‚ēĒ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĎ ‚ēö‚Ėą‚Ėą‚Ėą‚ēĒ‚ēĚ 
#    ‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĎ‚ēö‚Ėą‚Ėą‚ēĒ‚ēĚ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĎ ‚Ėą‚Ėą‚ēĒ‚Ėą‚Ėą‚ēó 
#    ‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĎ ‚ēö‚ēź‚ēĚ ‚Ėą‚Ėą‚ēĎ‚ēö‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĒ‚ēĚ‚Ėą‚Ėą‚ēĒ‚ēĚ ‚Ėą‚Ėą‚ēó
#    ‚ēö‚ēź‚ēĚ   ‚ēö‚ēź‚ēĚ     ‚ēö‚ēź‚ēĚ ‚ēö‚ēź‚ēź‚ēź‚ēź‚ēź‚ēĚ ‚ēö‚ēź‚ēĚ  ‚ēö‚ēź‚ēĚ
# #########################################

# ============================================================
# PLUGINS
# ============================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'

# ============================================================
# GENERAL
# ============================================================
# Start windows and panes at 1 to match keyboard layout
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

set -g history-limit 50000
set -g mouse on

# ============================================================
# TERMINAL
# ============================================================
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:RGB"

# ============================================================
# CLIPBOARD
# ============================================================
# Ensure wl-copy can find the Wayland display socket
set -g update-environment "WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_RUNTIME_DIR"

# OSC 52 passthrough ‚ÄĒ works with Ghostty on Linux and macOS
set -g set-clipboard on
set -g @yank_action 'copy-pipe-and-cancel'

# ============================================================
# PREFIX
# ============================================================
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ============================================================
# KEY BINDINGS
# ============================================================
bind r source-file ~/.config/tmux/tmux.conf  # reload config
bind c new-window -c "#{window_current_path}"
bind u run-shell '~/.config/tmux/popup.sh'

bind | split-window -h
bind - split-window -v

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Repeatable arrow-key pane resizing
bind -r Left  resize-pane -L 5
bind -r Down  resize-pane -D 5
bind -r Up    resize-pane -U 5
bind -r Right resize-pane -R 5

# ============================================================
# COPY MODE
# ============================================================
set -g mode-keys vi
bind -T copy-mode-vi v   send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y   send-keys -X copy-selection-and-cancel
unbind -T copy-mode-vi MouseDragEnd1Pane

# ============================================================
# CURSOR
# ============================================================
set -g cursor-style blinking-block
set-hook -g pane-mode-changed 'if -F "#{==:#{pane_mode},copy-mode}" "set cursor-style blinking-underline" "set cursor-style blinking-block"'

# ============================================================
# STYLE
# ============================================================
set -g popup-border-style fg=#FFCC00

# ============================================================
# TPM ‚ÄĒ keep at the bottom
# ============================================================
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins/'
run '~/.config/tmux/tpm.sh'
run '~/.config/tmux/plugins/tpm/tpm'

# Theme must load after TPM ‚ÄĒ tmux-sensible resets `status` to 1, which
# hides the double status bar (status-format[0] is intentionally blank).
run 'tmux source-file ~/.config/tmux/theme.conf'
