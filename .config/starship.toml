"$schema" = 'https://starship.rs/config-schema.json'

# Two-line prompt: context on line 1, input on line 2
format = """
$os$directory$git_branch$git_commit$git_state$git_metrics$git_status\
$fill\
$nodejs$python$rust$golang$java$kotlin$lua$php$ruby$swift$terraform$docker_context\
$line_break\
$jobs$cmd_duration$status$character"""

right_format = "$kubernetes$aws$gcloud$time"

add_newline = true

palette = "ayu"

[palettes.ayu]
orange  = "#FF8F40"
gold    = "#FFB454"
cyan    = "#39BAE6"
green   = "#AAD94C"
red     = "#FF3333"
purple  = "#D2A6FF"
blue    = "#59C2FF"
dim     = "#6C7380"
fg      = "#BFBDB6"

# ── Directory ──────────────────────────────────────────────────────────────────

[directory]
style           = "bold cyan"
truncation_length = 3
truncate_to_repo  = true
read_only       = " 󰌾"
read_only_style = "red"
format          = "[$path]($style)[$read_only]($read_only_style) "

[directory.substitutions]
"Documents" = "󰈙"
"Downloads" = " "
"src"       = ""
"~"         = "~"

# ── Git ────────────────────────────────────────────────────────────────────────

[git_branch]
symbol    = " "
style     = "bold orange"
format    = "[$symbol$branch(:$remote_branch)]($style) "
truncation_length = 32

[git_commit]
style           = "bold dim fg"
format          = "\\([$hash$tag]($style)\\) "
tag_symbol      = "  "
only_detached   = true

[git_state]
style   = "bold red"
format  = "\\([$state( $progress_current/$progress_total)]($style)\\) "

[git_metrics]
disabled           = false
added_style        = "bold green"
deleted_style      = "bold red"
format             = "([+$added]($added_style) )([-$deleted]($deleted_style) )"

[git_status]
style     = "bold gold"
format    = "([$all_status$ahead_behind]($style))"
ahead     = "⇡$count"
behind    = "⇣$count"
diverged  = "⇕⇡$ahead_count⇣$behind_count"
staged    = "[●$count](bold green)"
modified  = "[~$count](bold gold)"
untracked = "[?$count](bold dim)"
deleted   = "[-$count](bold red)"
renamed   = "[»$count](bold cyan)"
stashed   = "[≡$count](bold purple)"
conflicted = "[✖$count](bold red)"

# ── Languages (show only when in a relevant project) ──────────────────────────

[nodejs]
symbol  = " "
style   = "bold green"
format  = "[$symbol($version )]($style)"
detect_files = ["package.json", ".nvmrc", ".node-version"]

[python]
symbol  = " "
style   = "bold gold"
format  = "[$symbol($version )($virtualenv )]($style)"
detect_files = ["requirements.txt", "pyproject.toml", "setup.py", ".python-version", "Pipfile"]

[rust]
symbol  = " "
style   = "bold orange"
format  = "[$symbol($version )]($style)"

[golang]
symbol  = " "
style   = "bold cyan"
format  = "[$symbol($version )]($style)"

[java]
symbol  = " "
style   = "bold red"
format  = "[$symbol($version )]($style)"

[kotlin]
symbol  = " "
style   = "bold purple"
format  = "[$symbol($version )]($style)"

[lua]
symbol  = " "
style   = "bold blue"
format  = "[$symbol($version )]($style)"

[php]
symbol  = " "
style   = "bold purple"
format  = "[$symbol($version )]($style)"

[ruby]
symbol  = " "
style   = "bold red"
format  = "[$symbol($version )]($style)"

[swift]
symbol  = " "
style   = "bold orange"
format  = "[$symbol($version )]($style)"

[terraform]
symbol  = "󱁢 "
style   = "bold purple"
format  = "[$symbol($workspace )]($style)"

[docker_context]
symbol  = " "
style   = "bold blue"
format  = "[$symbol$context ]($style)"
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile"]

# ── Cloud / Infra ──────────────────────────────────────────────────────────────

[kubernetes]
disabled = false
symbol   = "󱃾 "
style    = "bold cyan"
format   = "[$symbol$context(/$namespace )]($style)"

[aws]
symbol  = " "
style   = "bold gold"
format  = "[$symbol($profile )($region )]($style)"

[gcloud]
symbol  = " "
style   = "bold blue"
format  = "[$symbol$account(@$domain)(/$project )]($style)"
disabled = true

# ── Status / Timing ────────────────────────────────────────────────────────────

[cmd_duration]
min_time      = 2_000
style         = "bold dim fg"
format        = "[ $duration]($style) "
show_milliseconds = false

[status]
disabled = false
style    = "bold red"
format   = "[$symbol $status ]($style)"
symbol   = "✖"
success_symbol = ""

[jobs]
symbol      = " "
style       = "bold dim fg"
format      = "[$symbol$number ]($style)"
threshold   = 1
number_threshold = 1

[time]
disabled  = false
style     = "bold dim"
format    = "[$time]($style) "
time_format = "%H:%M"

# ── Prompt character ───────────────────────────────────────────────────────────

[character]
success_symbol = "[❯](bold green)"
error_symbol   = "[❯](bold red)"
vimcmd_symbol  = "[❮](bold gold)"

# ── Fill (pushes right-side modules to the right on line 1) ───────────────────

[fill]
symbol = " "
style  = "dim"

# ── OS icon (optional flavor) ─────────────────────────────────────────────────

[os]
disabled = true
style    = "bold dim fg"
format   = "[$symbol ]($style)"

[os.symbols]
Linux   = " "
Ubuntu  = " "
Fedora  = " "
Arch    = " "
Debian  = " "
Macos   = " "
Windows = " "
